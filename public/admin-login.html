<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - OGEA Outreach Portal</title>
    <meta name="description" content="OGEA Admin Login - Darul Hidaya Dawa College">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==================== LOGIN PAGE STYLES ==================== */
        :root {
            --primary: #1a3a5c;
            --primary-light: #2a5298;
            --primary-dark: #0c1e33;
            --primary-gradient: linear-gradient(135deg, #0c1e33 0%, #1a3a5c 40%, #2a5298 100%);
            --gold: #c9a84c;
            --gold-light: #f0d78c;
            --accent: #e8c547;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0c1e33 0%, #1a3a5c 35%, #1e4d8c 65%, #2a5298 100%);
            position: relative;
            overflow: hidden;
        }

        /* Background decorative elements */
        body::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -15%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(201, 168, 76, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(42, 82, 152, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Floating particles */
        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        .particle:nth-child(1) { width: 8px; height: 8px; top: 10%; left: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 6px; height: 6px; top: 25%; left: 70%; animation-delay: 2s; }
        .particle:nth-child(3) { width: 10px; height: 10px; top: 50%; left: 15%; animation-delay: 4s; }
        .particle:nth-child(4) { width: 5px; height: 5px; top: 65%; left: 80%; animation-delay: 1s; }
        .particle:nth-child(5) { width: 7px; height: 7px; top: 80%; left: 40%; animation-delay: 3s; }
        .particle:nth-child(6) { width: 9px; height: 9px; top: 35%; left: 50%; animation-delay: 5s; }
        .particle:nth-child(7) { width: 4px; height: 4px; top: 15%; left: 85%; animation-delay: 6s; }
        .particle:nth-child(8) { width: 6px; height: 6px; top: 70%; left: 10%; animation-delay: 7s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.3; }
            25% { transform: translateY(-30px) translateX(20px) scale(1.5); opacity: 0.6; }
            50% { transform: translateY(-15px) translateX(-15px) scale(1); opacity: 0.3; }
            75% { transform: translateY(-40px) translateX(10px) scale(1.3); opacity: 0.5; }
        }

        /* Login Container */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Login Card */
        .login-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Logo Area */
        .login-logo {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-logo .logo-circle {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--gold), var(--accent));
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 800;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin-bottom: 16px;
            box-shadow: 0 8px 25px rgba(201, 168, 76, 0.4);
        }

        .login-logo h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .login-logo p {
            font-size: 13px;
            color: #64748b;
            font-weight: 400;
        }

        /* Form Styles */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 16px;
            transition: color 0.3s;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            color: #1a1a2e;
            background: #f8fafc;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(42, 82, 152, 0.1);
            background: white;
        }

        .input-wrapper input:focus + i,
        .input-wrapper input:focus ~ i {
            color: var(--primary-light);
        }

        .input-wrapper input.error {
            border-color: var(--danger);
            background: #fef2f2;
        }

        .input-wrapper input.success {
            border-color: var(--success);
            background: #f0fdf4;
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            transition: color 0.3s;
        }

        .password-toggle:hover {
            color: #475569;
        }

        /* Remember & Forgot */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #64748b;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary-light);
            cursor: pointer;
        }

        .forgot-link {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        /* Login Button */
        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(26, 58, 92, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .btn-login .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .btn-login.loading .spinner {
            display: block;
        }

        .btn-login.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error Message */
        .login-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 8px;
            animation: shake 0.5s ease;
        }

        .login-error.show {
            display: flex;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-4px); }
        }

        /* Success Message */
        .login-success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #065f46;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .login-success.show {
            display: flex;
        }

        /* Back to Site Link */
        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: white;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
                border-radius: 20px;
            }

            .login-logo .logo-circle {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }

            .login-logo h1 {
                font-size: 24px;
            }

            .btn-login {
                padding: 14px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <div class="logo-circle">OG</div>
                <h1>OGEA Admin</h1>
                <p>Darul Hidaya Dawa College, Manoor</p>
            </div>

            <!-- Login Form -->
            <form class="login-form" id="loginForm" autocomplete="off">
                <!-- Error Message -->
                <div class="login-error" id="loginError">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="loginErrorMessage">Invalid email or password</span>
                </div>

                <!-- Success Message -->
                <div class="login-success" id="loginSuccess">
                    <i class="fas fa-check-circle"></i>
                    <span>Login successful! Redirecting...</span>
                </div>

                <!-- Email Field -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="Enter your email" 
                            required 
                            autocomplete="off"
                        >
                    </div>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Enter your password" 
                            required 
                            autocomplete="off"
                        >
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember & Forgot -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link" onclick="alert('Please contact the administrator to reset your password.'); return false;">Forgot password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Sign In</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <!-- Back to Site -->
            <div class="back-link">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i> Back to OGEA Portal
                </a>
            </div>
        </div>
    </div>

    <!-- ==================== SCRIPTS ==================== -->
    <script>
        // ==================== CREDENTIALS ====================
        const VALID_EMAIL = 'outreachdhdc@gmail.com';
        const VALID_PASSWORD = 'outreachdhdc202';
        const ADMIN_PAGE = 'admin.html';

        // ==================== DOM ELEMENTS ====================
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const loginErrorMessage = document.getElementById('loginErrorMessage');
        const loginSuccess = document.getElementById('loginSuccess');
        const passwordToggle = document.getElementById('passwordToggle');
        const rememberMe = document.getElementById('rememberMe');

        // ==================== PASSWORD TOGGLE ====================
        passwordToggle.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            const icon = this.querySelector('i');
            icon.className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
            
            // Refocus password field
            passwordInput.focus();
        });

        // ==================== CHECK SAVED SESSION ====================
        function checkSavedSession() {
            const saved = localStorage.getItem('ogea_admin_session');
            if (saved) {
                const session = JSON.parse(saved);
                const now = new Date().getTime();
                const expiry = session.expiry || 0;
                
                if (now < expiry && session.email === VALID_EMAIL) {
                    // Valid session found, redirect to admin
                    window.location.href = ADMIN_PAGE;
                    return true;
                } else {
                    // Expired session
                    localStorage.removeItem('ogea_admin_session');
                }
            }
            return false;
        }

        // ==================== LOAD SAVED EMAIL ====================
        function loadSavedEmail() {
            const savedEmail = localStorage.getItem('ogea_remembered_email');
            if (savedEmail) {
                emailInput.value = savedEmail;
                rememberMe.checked = true;
            }
        }

        // ==================== FORM SUBMISSION ====================
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Hide previous messages
            loginError.classList.remove('show');
            loginSuccess.classList.remove('show');
            
            // Remove error/success classes
            emailInput.classList.remove('error', 'success');
            passwordInput.classList.remove('error', 'success');
            
            // Get values
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            
            // Validate email format
            if (!email || !isValidEmail(email)) {
                showError('Please enter a valid email address');
                emailInput.classList.add('error');
                emailInput.focus();
                return;
            }
            
            // Validate password
            if (!password) {
                showError('Please enter your password');
                passwordInput.classList.add('error');
                passwordInput.focus();
                return;
            }
            
            // Check credentials
            if (email === VALID_EMAIL && password === VALID_PASSWORD) {
                // Success!
                showSuccess();
                
                // Save session
                if (rememberMe.checked) {
                    // Save for 7 days
                    const session = {
                        email: email,
                        loginTime: new Date().toISOString(),
                        expiry: new Date().getTime() + (7 * 24 * 60 * 60 * 1000) // 7 days
                    };
                    localStorage.setItem('ogea_admin_session', JSON.stringify(session));
                    localStorage.setItem('ogea_remembered_email', email);
                } else {
                    // Save for current session only (24 hours)
                    const session = {
                        email: email,
                        loginTime: new Date().toISOString(),
                        expiry: new Date().getTime() + (24 * 60 * 60 * 1000) // 24 hours
                    };
                    localStorage.setItem('ogea_admin_session', JSON.stringify(session));
                    localStorage.removeItem('ogea_remembered_email');
                }
                
                // Redirect after short delay
                setTimeout(() => {
                    window.location.href = ADMIN_PAGE;
                }, 1200);
                
            } else {
                // Invalid credentials
                if (email !== VALID_EMAIL) {
                    showError('Invalid email address. Please try again.');
                    emailInput.classList.add('error');
                } else {
                    showError('Incorrect password. Please try again.');
                    passwordInput.classList.add('error');
                }
                
                // Shake effect
                loginBtn.style.animation = 'none';
                loginBtn.offsetHeight; // Trigger reflow
                loginBtn.style.animation = 'shake 0.5s ease';
                
                // Clear password field for security
                passwordInput.value = '';
                passwordInput.focus();
            }
        });

        // ==================== SHOW ERROR ====================
        function showError(message) {
            loginErrorMessage.textContent = message;
            loginError.classList.add('show');
            loginSuccess.classList.remove('show');
        }

        // ==================== SHOW SUCCESS ====================
        function showSuccess() {
            loginError.classList.remove('show');
            loginSuccess.classList.add('show');
            
            // Show loading state
            loginBtn.classList.add('loading');
            
            // Add success indicators
            emailInput.classList.add('success');
            passwordInput.classList.add('success');
        }

        // ==================== VALIDATE EMAIL ====================
        function isValidEmail(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }

        // ==================== KEYBOARD SHORTCUTS ====================
        document.addEventListener('keydown', function(e) {
            // Ctrl+Enter to submit
            if (e.ctrlKey && e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });

        // ==================== INITIALIZATION ====================
        function init() {
            // Check if already logged in
            if (checkSavedSession()) {
                return; // Redirecting...
            }
            
            // Load saved email
            loadSavedEmail();
            
            // Focus on email field
            setTimeout(() => {
                if (!emailInput.value) {
                    emailInput.focus();
                } else {
                    passwordInput.focus();
                }
            }, 500);
            
            console.log('🔐 OGEA Admin Login Ready');
            console.log('👤 Email: ' + VALID_EMAIL);
        }

        // Start the app
        init();
    </script>
</body>
</html>
